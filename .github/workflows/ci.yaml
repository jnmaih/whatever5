name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sanity check repository
        run: |
          echo "Component name: "
          echo "Files in repo:"
          ls -la

  docs:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Install mkdocs dependencies
        run: |
          python -m pip install -U pip
          pip install mkdocs mkdocs-material mkdocs-techdocs-core
      - name: Build TechDocs site
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          mkdocs build
